name: Moroccan Stock Intelligence

on:
  schedule:
    # Times are UTC. Morocco is UTC+1 (UTC+0 during Ramadan, so labels can drift 1h).
    # NOTE: GitHub may delay top-of-hour scheduled runs by a few minutes under load.
    - cron: "0 9 * * 1-5" # 10:00 Morocco - morning digest
    - cron: "0 15 * * 1-5" # 16:00 Morocco - closing digest
    - cron: "0 11,13 * * 1-5" # 12:00 & 14:00 Morocco - lightweight intraday update
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning-digest"
        type: choice
        options:
          - morning-digest
          - afternoon-digest
          - intraday-update
          - watch-holdings
          - run-once
          - collect
          - analyze
          - daily-summary

permissions:
  contents: read

concurrency:
  group: moroccan-stock-intelligence
  cancel-in-progress: false

jobs:
  market-intelligence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore market database
        uses: actions/cache/restore@v4
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}
          restore-keys: |
            market-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Select run mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 9 * * 1-5" ]]; then
            echo "mode=morning-digest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 15 * * 1-5" ]]; then
            echo "mode=afternoon-digest" >> "$GITHUB_OUTPUT"
          else
            echo "mode=intraday-update" >> "$GITHUB_OUTPUT"
          fi

      - name: Run intelligence platform
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: private holdings as raw JSON so buy prices are never committed.
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
          DATABASE_URL: sqlite:///data/market.db
          LOG_LEVEL: INFO
          HTTP_ALLOW_INSECURE_SOURCE_RETRY: true
        run: python -m moroccan_stock_intelligence.cli "${{ steps.mode.outputs.mode }}"

      - name: Save market database cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}

      - name: Upload market database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-db
          path: data/market.db
          if-no-files-found: ignore
          retention-days: 30
