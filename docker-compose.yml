services:
  collector:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    command: python -m moroccan_stock_intelligence.cli run-once

  dashboard:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.address 0.0.0.0

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
