# Render Blueprint — an ALTERNATE host. Production runs on Railway (HANDOVER.md §1);
# this blueprint is the escape hatch if that ever changes. It is not deployed today.
#
# Deploy exactly ONE of the two. Whichever runs is the single source of truth for
# notifications: two hosts holding TELEGRAM_BOT_TOKEN would each send digests from
# their own volume, i.e. from different histories, and contradict each other about
# the same stock — the exact failure that killed the old GitHub Actions path.
#
# Deploy: push this repo, then on render.com → New → Blueprint → pick this repo.
# Fill the secret env vars (marked sync:false) in the dashboard after the first deploy.
#
# NOTE: the scheduler (09:00 / 11:00 / 13:00 / 15:00 / 17:00 notifications, plus
# the 18:00 research run and the 22:00 backup) needs an always-on
# instance. Render's Free plan sleeps after ~15 min idle, which would skip those
# jobs — use the Starter plan (or keep the GitHub Actions Telegram path for the
# guaranteed schedule and use the PWA just for viewing).
services:
  - type: web
    name: bourse-alerts
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # always-on; "free" sleeps and would skip scheduled pushes
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: market-data
      mountPath: /app/data # persists data/market.db across deploys (SQLite lives here)
      sizeGB: 1
    envVars:
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: TIMEZONE
        value: Africa/Casablanca
      - key: HTTP_ALLOW_INSECURE_SOURCE_RETRY
        value: "true"
      # --- secrets: set these in the Render dashboard (never committed) ---
      # AUTH_PASSWORD is REQUIRED. Without it (or under 12 characters) every
      # protected route answers 503 and the app is unusable — deliberately, since
      # the alternative is serving holdings and P/L to anyone with the URL.
      # Changing it here also invalidates every live session.
      - key: AUTH_PASSWORD
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: PORTFOLIO_JSON # config/portfolio.json is gitignored; pass it here as one-line JSON
        sync: false
      # --- optional: also send the Telegram digests from this server ---
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
